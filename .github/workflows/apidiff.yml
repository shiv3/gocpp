name: API Diff
on:
  pull_request:

jobs:
  apidiff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Check API compatibility against latest tag
        run: |
          if git describe --tags --abbrev=0 | grep -q '^v1'; then
            ./scripts/apidiff.sh
          else
            echo "Pre-v1.0: API may change; skipping incompatibility gate."
          fi
