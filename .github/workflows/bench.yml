name: Bench
on:
  schedule:
    - cron: "0 4 * * 1" # weekly Monday
  workflow_dispatch: {}
  push:
    tags: ["v*"]

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - run: go install golang.org/x/perf/cmd/benchstat@latest
      - run: COUNT=6 ./benchmarks/bench.sh new.txt
      - name: Compare to baseline
        run: benchstat benchmarks/baseline.txt new.txt | tee compare.txt

  soak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - run: SOAK_DURATION=5m go test -tags soak -timeout 10m ./internal/soak/
