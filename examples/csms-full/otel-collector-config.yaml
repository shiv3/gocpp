receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  # debug prints received spans and metrics to the collector's stdout (docker logs)
  # so the OTel pipeline can be inspected directly.
  debug:
    verbosity: detailed
  # prometheus re-exposes the OTLP metrics in Prometheus format for scraping,
  # demonstrating the OTLP -> Prometheus path without the app speaking Prometheus.
  prometheus:
    endpoint: 0.0.0.0:8889

service:
  telemetry:
    logs:
      level: info
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, prometheus]
