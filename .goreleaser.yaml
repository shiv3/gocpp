version: 2
project_name: gocpp

builds:
  - id: gocpp-validate
    main: ./cmd/gocpp-validate
    binary: gocpp-validate
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
  - id: gocpp-sim
    main: ./cmd/gocpp-sim
    binary: gocpp-sim
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - id: default
    ids: [gocpp-validate, gocpp-sim]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: shiv3
    name: gocpp
